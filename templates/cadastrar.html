{% extends "base.html" %}

{% block content %}

<div class="topo">

    <h1>Cadastrar Novo Jogo</h1>

    <a href="{{ url_for('index') }}" class="btn">

        ← Voltar

    </a>

</div>

<div class="painel">

    <form method="POST" enctype="multipart/form-data" class="cadastro-form">

        <input
            type="text"
            name="nome"
            placeholder="Nome do jogo"
            value="{{dados.get('nome', '') }}"
            required
        >

        <input
            type="text"
            name="descricao"
            placeholder="Descrição do jogo"
            value="{{ dados.get('descricao', '') }}"
            required
        >

        <select name="genero_id" required>

            <option value="">
                Selecione um gênero
            </option>

            {% for genero in generos %}

                <option value="{{ genero.id }}" 
                {% if dados.get('genero_id')|int == genero.id %}selected{% endif %}>

                    {{ genero.nome }}

                </option>

            {% endfor %}

        </select>

        <select name="categoria_id" required>

            <option value="">
                Selecione uma categoria
            </option>

            {% for categoria in categorias %}

                <option value="{{ categoria.id }}" 
                {% if dados.get('categoria_id')|int == categoria.id %}selected{% endif %}>

                    {{ categoria.nome }}

                </option>

            {% endfor %}

        </select>

        <select name="classificacao" required>

            <option value="">
                Selecione a classificação
            </option>

            {% for classificacao in classificacoes %}

                <option value="{{ classificacao }}" 
                {% if dados.get('classificacao') == classificacao %}selected{% endif %}>

                    {{ classificacao }}

                </option>

            {% endfor %}

        </select>


        <input
            type="text"
            name="ano"
            placeholder="Ano de lançamento"
            value="{{dados.get('ano', '') }}"
            inputmode="numeric"
            maxlength="4"
            pattern="[0-9]{4}"
            oninput="this.value = this.value.replace(/\D/g, '')"
            required
        >

        <!-- CAPA -->

        <!--
        <label class="label-capa">

            Imagem de capa

            <input
                type="file"
                name="capa"
                accept="image/*">

        </label>
        -->

        <label for="capa_url">

            Informe a URL da imagem (Opcional)

        </label>

        <input
            type="url"
            id="capa_url"
            name="capa_url"
            placeholder="https://site.com/imagem.jpg"
            value="{{ dados.get('capa_url', '') }}"
        >

        <button type="submit">

            Cadastrar Jogo

        </button>

    </form>

</div>

{% endblock %}
